x-app: &default-app
  build:
    context: .
    dockerfile: ./infrastructure/docker/Dockerfile
    target: app-final
  secrets:
    - db-password
    - db-root-password
  restart: unless-stopped
  depends_on:
    db:
      condition: service_healthy
  env_file:
    - ".env"
  networks:
    - backend


services:
  db:
    image: mariadb
    restart: always
    secrets:
      - db-password
      - db-root-password
    volumes:
      - db-data:/var/lib/mysql
    environment: 
      MARIADB_ROOT_PASSWORD_FILE: "${MARIADB_ROOT_PASSWORD_FILE}" 
      MARIADB_PASSWORD_FILE: "${MARIADB_PASSWORD_FILE}"
      MARIADB_DATABASE: "${MARIADB_NAME}"
      MARIADB_USER: "${MARIADB_USER}"
    expose: 
      - "${MARIADB_PORT:-3306}"
    healthcheck:
      test:
        [
          "CMD",
          "/usr/local/bin/healthcheck.sh",
          "--su-mysql",
          "--connect",
          "--innodb_initialized",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend


  web:
    <<: *default-app
    ports:
      - "8000:${PORT:-8000}"
    deploy:
      resources:
        limits:
          memory: 521M
          cpus: "1.0"
    healthcheck:
      test: 
        [
          "CMD-SHELL",
          "curl -f http://localhost:${PORT}/spost/up/ || exit 1",        
        ]
      interval: "60s"
      timeout: "3s"
      start_period: "5s"
    networks:
      - frontend
      - backend

volumes:
  db-data:
  
secrets:
  db-password:
    file: ./infrastructure/db/password.txt
  db-root-password:
    file: ./infrastructure/db/root-password.txt

networks:
  frontend:
    driver: bridge
  backend:
    internal: true
